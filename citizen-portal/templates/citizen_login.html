<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - Government of Sri Lanka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #f472b6;
            --success: #22c55e;
            --danger: #fb7185;
            --bg: #050a1a;
            --text: #eef2ff;
            --text-muted: #cbd5e1;
            --surface: rgba(10, 16, 34, 0.95);
            --border: rgba(255, 255, 255, 0.12);
            --shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(6, 182, 212, 0.16), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.14), transparent 24%),
                        linear-gradient(180deg, #071224 0%, #050a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 28px 32px 24px;
            text-align: center;
            color: white;
        }

        .card-header .flag {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .card-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-header p {
            font-size: 0.85rem;
            opacity: 0.85;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: #f9fafb;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }

        .tab-btn:hover:not(.active) {
            background: #f3f4f6;
            color: #374151;
        }

        .card-body {
            padding: 28px 32px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }

        input[type=text],
        input[type=email],
        input[type=password],
        input[type=tel] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(244, 114, 182, 0.28);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .divider {
            text-align: center;
            color: #9ca3af;
            font-size: 0.8rem;
            margin: 8px 0 16px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pwd-row {
            position: relative;
        }

        .pwd-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 1rem;
            padding: 0;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-header">
            <div class="flag">🏛️</div>
            <h1>Citizen Portal</h1>
            <p>Government of Sri Lanka – Secure Access</p>
        </div>



        <div class="card-body">

            <!-- LOGIN PANEL -->
            <div class="tab-panel active" id="panel-login">
                <div class="alert alert-error" id="login-error"></div>
                <div class="alert alert-success" id="login-success"></div>
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="pwd-row">
                        <input type="password" id="login-password" placeholder="Enter your password"
                            autocomplete="current-password">
                        <button class="pwd-toggle" type="button" onclick="togglePwd('login-password', this)">👁</button>
                    </div>
                </div>
                <div style="text-align: right; margin-top: -12px; margin-bottom: 18px;">
                    <a href="#" onclick="doForgot()" style="font-size: 0.8rem; color: var(--secondary); text-decoration: none;">Forgot Password?</a>
                </div>
                <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
                    <span id="login-label">Login to Portal</span>
                    <div class="spinner" id="login-spinner"></div>
                </button>
                <div class="divider">or</div>
                <p style="text-align:center;font-size:0.85rem;color:#6b7280;">Don't have an account? <a href="/citizen/register" style="color:var(--primary);font-weight:600;">Register here</a>
                </p>
            </div>


        </div>

        <a href="/" class="back-link">← Back to Citizen Portal</a>
        <div style="height:20px;"></div>
    </div>



    <script>
        async function doForgot() {
            hideAlerts('login-error', 'login-success');
            const email = document.getElementById('login-email').value.trim();
            if (!email) { 
                showAlert('login-error', 'Please enter your Gmail address in the field above to receive a reset link.'); 
                document.getElementById('login-email').focus();
                return; 
            }
            
            // Show a temporary "sending" state on the forgot link if possible, or just use login spinner
            setLoading('login-btn', 'login-spinner', 'login-label', true);
            
            try {
                const res = await fetch('/api/citizen/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('login-success', '✓ Reset link sent! Please check your Gmail inbox.');
                } else {
                    showAlert('login-error', data.error || 'Failed to request reset.');
                }
            } catch (e) {
                showAlert('login-error', 'Connection error. Please try again.');
            }
            setLoading('login-btn', 'login-spinner', 'login-label', false);
        }



        function togglePwd(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁' : '🙈';
        }

        function showAlert(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideAlerts(...ids) { ids.forEach(id => { document.getElementById(id).style.display = 'none'; }); }

        function setLoading(btn, spinner, label, loading) {
            document.getElementById(btn).disabled = loading;
            document.getElementById(spinner).style.display = loading ? 'block' : 'none';
            document.getElementById(label).style.display = loading ? 'none' : 'block';
        }

        async function doLogin() {
            hideAlerts('login-error', 'login-success');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showAlert('login-error', 'Please enter email and password.'); return; }
            setLoading('login-btn', 'login-spinner', 'login-label', true);
            try {
                const res = await fetch('/api/citizen/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('login-success', '✓ Login successful! Redirecting...');
                    localStorage.setItem('citizen_token', data.token);
                    localStorage.setItem('citizen_name', data.name || email);
                    localStorage.setItem('citizen_id', data.user_id || '');
                    localStorage.setItem('profile_id', data.user_id || '');
                    setTimeout(() => window.location.href = '/', 900);
                } else {
                    showAlert('login-error', data.error || 'Invalid email or password.');
                }
            } catch (e) {
                showAlert('login-error', 'Connection error. Please try again.');
            }
            setLoading('login-btn', 'login-spinner', 'login-label', false);
        }



        // Submit on Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>

</html>
