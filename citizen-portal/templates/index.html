<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sri Lanka Citizen Services Portal – access government services, ministry information, and AI-powered assistance in English, Sinhala, and Tamil.">
    <title>Citizen Services Portal</title>

    <!-- External Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Application Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ============================================================
         TOP NAVIGATION BAR
    ============================================================ -->
    <header class="top-nav" role="banner">
        <div class="logo">
            <i class="fas fa-landmark" aria-hidden="true"></i>
            <span>Citizen Portal</span>
        </div>

        <nav class="header-actions" aria-label="Site actions">
            <button class="btn-secondary" id="open-profile-modal-btn" onclick="document.getElementById('profile-modal').style.display='flex'" aria-label="Open profile setup">
                <i class="fas fa-user-circle" aria-hidden="true"></i> My Profile
            </button>
        </nav>
    </header>

    <!-- ============================================================
         MAIN THREE-COLUMN DASHBOARD LAYOUT
    ============================================================ -->
    <div class="main-layout" role="main">

        <!-- ─────────────────────────────────────────────────────────
             COLUMN 1 · SIDEBAR
        ───────────────────────────────────────────────────────── -->
        <aside class="sidebar" aria-label="Categories and language options">

            <!-- Category Navigation -->
            <section class="sidebar-section" aria-labelledby="cat-heading">
                <h2 id="cat-heading">
                    <i class="fas fa-th-large" aria-hidden="true"></i> Categories
                </h2>
                <div id="category-list" role="list" aria-label="Service categories">
                    <!-- JS-injected category links populate here -->
                </div>
            </section>

            <!-- Language Switcher -->
            <div class="lang-switch" role="group" aria-label="Language selection">
                <button id="lang-en" class="lang-btn active" onclick="setLang('en')" aria-pressed="true">
                    English
                </button>
                <button id="lang-si" class="lang-btn" onclick="setLang('si')" aria-pressed="false">
                    සිංහල
                </button>
                <button id="lang-ta" class="lang-btn" onclick="setLang('ta')" aria-pressed="false">
                    தமிழ்
                </button>
            </div>

            <!-- Announcements / Ads Area -->
            <div class="ads" id="ads-area" aria-label="Announcements and programs" role="complementary">
                <!-- Active informational campaigns injected by JS -->
            </div>

        </aside>

        <!-- ─────────────────────────────────────────────────────────
             COLUMN 2 · INTERMEDIATE SUBSERVICE SECTION
        ───────────────────────────────────────────────────────── -->
        <section class="middle" aria-labelledby="sub-title">

            <h2 id="sub-title">Select Subservice</h2>

            <ul id="sub-list" role="list" aria-label="Subservice list">
                <!-- Populated by JS when a category is selected -->
            </ul>

        </section>

        <!-- ─────────────────────────────────────────────────────────
             COLUMN 3 · PRIMARY CONTENT WORKSPACE
        ───────────────────────────────────────────────────────── -->
        <main class="content" aria-label="Service questions and answers">

            <!-- Search Row -->
            <div class="search-row" role="search">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search services or ask a question..."
                    autocomplete="off"
                    aria-label="Search services or ask a question"
                >
                <button
                    class="btn-primary ask-btn"
                    id="ask-ai-btn"
                    onclick="openChat()"
                    aria-label="Open AI assistant"
                >
                    <i class="fas fa-robot" aria-hidden="true"></i> Ask (AI)
                </button>
            </div>

            <!-- Question List -->
            <section aria-labelledby="q-title">
                <h2 id="q-title">Select Question</h2>
                <ul id="question-list" role="list" aria-label="Available questions">
                    <!-- Populated by JS when a subservice is selected -->
                </ul>
            </section>

            <!-- Answer Display Box -->
            <div id="answer-box" aria-live="polite" aria-label="Answer content">
                <!-- Answer payloads, instructions, location links,
                     and file download paths rendered here by JS -->
            </div>

        </main>

    </div><!-- /.main-layout -->


    <!-- ============================================================
         PROGRESSIVE PROFILE MODAL
    ============================================================ -->
    <div id="profile-modal" class="modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="profile-modal-heading">
        <div class="modal-content">

            <button
                class="modal-close-btn"
                onclick="document.getElementById('profile-modal').style.display='none'"
                aria-label="Close profile modal"
            >×</button>

            <h3 id="profile-modal-heading">
                <i class="fas fa-user-circle" aria-hidden="true"></i> Tell us about you
            </h3>

            <!-- Step 1: Name & Age -->
            <div id="profile-step-1" class="profile-step" style="display:block;">
                <p class="step-indicator">Step 1 of 3</p>

                <div class="form-group">
                    <label for="p_name">Full Name</label>
                    <input
                        type="text"
                        id="p_name"
                        placeholder="Enter your name"
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label for="p_age">Age</label>
                    <input
                        type="number"
                        id="p_age"
                        placeholder="Your age"
                        min="1"
                        max="120"
                        autocomplete="off"
                    >
                </div>

                <div class="step-actions">
                    <button class="btn-primary" onclick="profileNext(1)">
                        Next <i class="fas fa-arrow-right" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <!-- Step 2: Email & Mobile -->
            <div id="profile-step-2" class="profile-step" style="display:none;">
                <p class="step-indicator">Step 2 of 3</p>

                <div class="form-group">
                    <label for="p_email">Email Address</label>
                    <input
                        type="email"
                        id="p_email"
                        placeholder="your@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="p_phone">Mobile Number</label>
                    <input
                        type="tel"
                        id="p_phone"
                        placeholder="+94 7X XXX XXXX"
                        autocomplete="tel"
                    >
                </div>

                <div class="step-actions">
                    <button class="btn-secondary" onclick="profileBack(2)">
                        <i class="fas fa-arrow-left" aria-hidden="true"></i> Back
                    </button>
                    <button class="btn-primary" onclick="profileNext(2)">
                        Next <i class="fas fa-arrow-right" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <!-- Step 3: Job / Workplace -->
            <div id="profile-step-3" class="profile-step" style="display:none;">
                <p class="step-indicator">Step 3 of 3</p>

                <div class="form-group">
                    <label for="p_job">Job Role / Workplace</label>
                    <input
                        type="text"
                        id="p_job"
                        placeholder="e.g. Teacher, Engineer, Self-employed..."
                        autocomplete="organization-title"
                    >
                </div>

                <div class="step-actions">
                    <button class="btn-secondary" onclick="profileBack(3)">
                        <i class="fas fa-arrow-left" aria-hidden="true"></i> Back
                    </button>
                    <button class="btn-primary" onclick="profileSubmit()">
                        <i class="fas fa-check" aria-hidden="true"></i> Submit
                    </button>
                </div>
            </div>

        </div><!-- /.modal-content -->
    </div><!-- /#profile-modal -->


    <!-- ============================================================
         AI ASSISTANT CHAT PANEL
    ============================================================ -->
    <aside class="chat-panel" id="chat-panel" aria-label="AI Assistant" aria-hidden="true">

        <!-- Panel Header -->
        <div class="chat-header">
            <h3>
                <i class="fas fa-robot" aria-hidden="true"></i> AI Assistant
            </h3>
            <button
                class="chat-close-btn"
                onclick="closeChat()"
                aria-label="Close AI assistant"
            >×</button>
        </div>

        <!-- Message Log -->
        <div class="chat-body" id="chat-body" role="log" aria-live="polite" aria-label="Conversation history">
            <div class="chat-msg ai">
                <i class="fas fa-robot" aria-hidden="true"></i>
                Hello! I can help you find government services and answer your questions. What would you like to know?
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-row">
                <input
                    type="text"
                    id="chat-text"
                    placeholder="Ask a question..."
                    autocomplete="off"
                    oninput="autosuggest(this.value)"
                    onkeydown="if(event.key==='Enter') sendChat()"
                    aria-label="Type your message"
                >
                <button
                    class="btn-primary send-btn"
                    onclick="sendChat()"
                    aria-label="Send message"
                >
                    <i class="fas fa-paper-plane" aria-hidden="true"></i> Send
                </button>
            </div>

            <!-- Typeahead Suggestions Box -->
            <div id="suggestions" class="suggestions" role="listbox" aria-label="Search suggestions">
                <!-- Populated by autosuggest() -->
            </div>
        </div>

    </aside><!-- /#chat-panel -->


    <!-- Application Script Bundle -->
    <script src="/static/script.js"></script>

</body>
</html>
