<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Citizen Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #f472b6;
            --success: #22c55e;
            --danger: #fb7185;
            --bg: #050a1a;
            --text: #eef2ff;
            --text-muted: #cbd5e1;
            --surface: rgba(10, 16, 34, 0.95);
            --border: rgba(255, 255, 255, 0.12);
            --shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(6, 182, 212, 0.16), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.14), transparent 24%),
                        linear-gradient(180deg, #071224 0%, #050a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
        }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; color: var(--text); }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.18); }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--secondary); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(244, 114, 182, 0.28); }
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.875rem;
        }
        .alert-error { background: rgba(251, 113, 133, 0.12); color: #fca5a5; border: 1px solid rgba(251, 113, 133, 0.25); }
        .alert-success { background: rgba(34, 197, 94, 0.12); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.25); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Set New Password</h1>
        <p>Please enter your new secure password below.</p>
        
        <div class="alert alert-error" id="error"></div>
        <div class="alert alert-success" id="success"></div>
        
        <div id="reset-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Minimum 8 characters">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm New Password</label>
                <input type="password" id="confirm" placeholder="Re-enter password">
            </div>
            <button class="btn" onclick="submitReset()">Update Password</button>
        </div>
        
        <div id="success-link" style="display:none; text-align:center; margin-top:1rem;">
            <a href="/citizen/login" style="color:var(--primary); font-weight:600; text-decoration:none;">Go to Login</a>
        </div>
    </div>

    <script>
        const token = "{{ token }}";
        
        function showAlert(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function submitReset() {
            document.getElementById('error').style.display = 'none';
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            if (password.length < 8) { showAlert('error', 'Password must be at least 8 characters.'); return; }
            if (password !== confirm) { showAlert('error', 'Passwords do not match.'); return; }
            
            try {
                const res = await fetch('/api/citizen/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('success', 'Password updated successfully!');
                    document.getElementById('reset-form').style.display = 'none';
                    document.getElementById('success-link').style.display = 'block';
                } else {
                    showAlert('error', data.error || 'Failed to reset password.');
                }
            } catch (e) {
                showAlert('error', 'Connection error.');
            }
        }
    </script>
</body>
</html>
