<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Citizen Portal</title>
    <style>
        :root {
            --bg: #050a1a;
            --card-bg: rgba(10, 16, 34, 0.95);
            --primary: #06b6d4;
            --secondary: #f472b6;
            --success: #22c55e;
            --error: #fb7185;
            --text: #eef2ff;
            --text-muted: #cbd5e1;
            --border: rgba(255, 255, 255, 0.12);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(6, 182, 212, 0.16), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.14), transparent 24%),
                        linear-gradient(180deg, #071224 0%, #050a1a 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 { margin-top: 0; font-size: 1.75rem; }
        p { color: var(--text-muted); line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            {% if success %}
                ✅
            {% else %}
                ❌
            {% endif %}
        </div>
        <h1>
            {% if success %}
                Verification Successful!
            {% else %}
                Verification Failed
            {% endif %}
        </h1>
        <p>{{ message }}</p>
        <a href="/citizen/login" class="btn">Return to Login</a>
    </div>
</body>
</html>
